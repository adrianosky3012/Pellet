<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumi Pellet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2435;
    --border: #2a3147;
    --accent: #f5a623;
    --accent2: #e8714a;
    --text: #e8e6df;
    --muted: #7a8099;
    --pellet: #c8a96e;
    --gas: #6eb5c8;
    --green: #6ec87a;
    --red: #c86e6e;
    --tab-h: 48px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    font-size: 13px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-bottom: 14px;
  }
  .app-title span { color: var(--muted); font-size: 14px; font-style: italic; }

  .tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 16px;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    min-width: 64px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main { padding: 20px; max-width: 1100px; margin: 0 auto; }

  /* ── Summary bar ── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .scard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .scard-label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .scard-val {
    font-size: 20px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
  }
  .scard-val.pellet { color: var(--pellet); }
  .scard-val.gas { color: var(--gas); }
  .scard-val.total { color: var(--accent); }
  .scard-val.sacchi { color: var(--green); }

  /* ── Section headings ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-head {
    background: var(--surface2);
    padding: 10px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-head .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .dot.p { background: var(--pellet); }
  .dot.g { background: var(--gas); }
  .dot.s { background: var(--green); }
  .dot.r { background: var(--accent); }

  /* ── Pellet config ── */
  .pellet-config {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 16px;
  }
  .config-group { display: flex; flex-direction: column; gap: 8px; }
  .config-group label { font-size: 11px; color: var(--muted); }

  .row-inputs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-group label { font-size: 10px; color: var(--muted); }

  input[type=number], input[type=text] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    width: 100px;
    transition: border-color 0.2s;
  }
  input[type=number]:focus, input[type=text]:focus {
    outline: none;
    border-color: var(--accent);
  }
  input.wide { width: 140px; }
  input.narrow { width: 72px; }

  /* ── Monthly grid ── */
  .months-grid {
    display: grid;
    grid-template-columns: 160px repeat(6, 1fr);
    gap: 0;
  }
  .mg-header {
    display: contents;
  }
  .mg-header > div {
    background: var(--surface2);
    padding: 8px 10px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .mg-header > div:first-child { text-align: left; }

  .mg-row {
    display: contents;
  }
  .mg-row > div {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
  }
  .mg-row > div:first-child {
    text-align: left;
    color: var(--muted);
    font-size: 11px;
  }
  .mg-row.total > div {
    background: var(--surface2);
    color: var(--accent);
    font-weight: 500;
  }
  .mg-row.sub > div { color: var(--muted); font-size: 11px; }

  /* ── Day grid ── */
  .day-grid-wrap { padding: 16px; overflow-x: auto; }
  .day-grid {
    display: grid;
    grid-template-columns: 36px repeat(6, 1fr);
    gap: 3px;
    min-width: 400px;
  }
  .dg-header {
    display: contents;
  }
  .dg-header > div {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 2px;
    background: var(--surface2);
    border-radius: 4px;
  }
  .dg-row { display: contents; }
  .dg-row > .day-num {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dg-row > .day-cell {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .day-cb {
    width: 22px; height: 22px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    appearance: none;
    -webkit-appearance: none;
    transition: all 0.15s;
    position: relative;
  }
  .day-cb:checked {
    background: var(--pellet);
    border-color: var(--pellet);
  }
  .day-cb:checked::after {
    content: '';
    position: absolute;
    left: 6px; top: 3px;
    width: 5px; height: 9px;
    border: 2px solid #0f1117;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }
  .day-cb:disabled {
    opacity: 0.2;
    cursor: not-allowed;
  }

  /* ── Ore accensione ── */
  .orario-grid {
    display: grid;
    grid-template-columns: 160px repeat(6, 1fr);
    gap: 4px;
    padding: 12px 16px;
  }
  .orario-label {
    color: var(--muted);
    font-size: 11px;
    display: flex;
    align-items: center;
  }
  .orario-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 7px;
    width: 100%;
  }
  .orario-input:focus { outline: none; border-color: var(--accent); }

  /* ── Gas section ── */
  .gas-grid {
    display: grid;
    grid-template-columns: 180px repeat(6, 1fr);
    gap: 0;
    padding: 0;
  }
  .gas-row { display: contents; }
  .gas-row > div {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
  }
  .gas-row > div:first-child {
    text-align: left;
    color: var(--muted);
    font-size: 11px;
  }
  .gas-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--gas);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 6px;
    width: 90%;
    text-align: center;
  }
  .gas-input:focus { outline: none; border-color: var(--gas); }
  .gas-calc { color: var(--gas); font-size: 12px; }

  /* ── Pellet stock ── */
  .stock-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    padding: 16px;
  }
  .stock-item { display: flex; flex-direction: column; gap: 4px; }
  .stock-item label { font-size: 11px; color: var(--muted); }
  .stock-item input { width: 100%; }

  /* ── Gas costs table (euro/mq) ── */
  .costs-table { padding: 16px; overflow-x: auto; }
  table.ctable {
    border-collapse: collapse;
    width: 100%;
    min-width: 500px;
  }
  .ctable th {
    font-size: 10px;
    color: var(--muted);
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .ctable td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .ctable td input {
    width: 100px;
    padding: 4px 6px;
    font-size: 12px;
  }
  .ctable .calc-td { color: var(--accent); }
  .ctable .add-row-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .ctable .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .del-row-btn {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .del-row-btn:hover { opacity: 1; }

  /* ── Media consumi ── */
  .media-grid {
    display: grid;
    grid-template-columns: 220px repeat(6, 1fr);
    gap: 0;
  }
  .media-row { display: contents; }
  .media-row > div {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
  .media-row > div:first-child { text-align: left; }
  .media-row.val > div { color: var(--text); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .months-grid { grid-template-columns: 110px repeat(6, 1fr); font-size: 11px; }
    .gas-grid { grid-template-columns: 120px repeat(6, 1fr); font-size: 11px; }
    .media-grid { grid-template-columns: 150px repeat(6, 1fr); }
    .stock-grid { grid-template-columns: 1fr 1fr; }
    .summary-bar { grid-template-columns: 1fr 1fr; }
  }

  .hidden { display: none !important; }

  /* floating save indicator */
  #save-toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--green);
    color: #0f1117;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #save-toast.show { opacity: 1; }

  .info-note {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 16px 12px;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="app-title">🔥 Consumi Pellet <span>— tracker spese invernali</span></div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="main" id="main"></div>

<div id="save-toast">✓ Salvato</div>

<script>
const YEARS = [2027,2028,2029,2030,2031,2032,2033,2034];
const MONTHS = ['Ottobre','Novembre','Dicembre','Gennaio','Febbraio','Marzo'];
const MONTH_DAYS = [31,30,31,31,28,31]; // days per month (Feb variable but start simple)

// ── State ──────────────────────────────────────────────────────────────────
function defaultYear(y) {
  return {
    costoPellet: 6.31,
    pelletAbete: { sacchi: 0, prezzo: 6.7 },
    pelletMisto: { sacchi: 0, prezzo: 5.1 },
    // day matrix: 6 months × 31 days, 1 = sacco usato, 0 = no, -1 = non esiste
    days: buildDayMatrix(),
    gas: {
      pagare: [0,0,0,0,0,0],
      smc:    [0,0,0,0,0,0],
    },
    orari: ['','','','','',''],
    orari2: ['','','','','',''],
    euroMq: 1.34,
    costsRows: [
      { dal: '', al: '', giorni: 0, consumo: 0, note: '' },
    ],
    anno: y,
  };
}

function buildDayMatrix() {
  // 6 months, each 31 slots
  return Array.from({length:6}, () => Array(31).fill(0));
}

function isDayValid(monthIdx, dayIdx) {
  // dayIdx is 0-based
  const days = [31,30,31,31,28,31];
  return dayIdx < days[monthIdx];
}

// Load or init state
function loadState() {
  try {
    const s = localStorage.getItem('consumi_pellet_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  const state = {};
  YEARS.forEach(y => { state[y] = defaultYear(y); });
  return state;
}

let state = loadState();

function saveState() {
  try { localStorage.setItem('consumi_pellet_v2', JSON.stringify(state)); } catch(e){}
  const toast = document.getElementById('save-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1200);
}

// ── Calculations ────────────────────────────────────────────────────────────
function calcYear(y) {
  const d = state[y];
  const months = MONTHS.map((_,mi) => {
    const col = d.days[mi];
    const q1 = col.slice(0,15).reduce((s,v) => s + (isDayValid(mi,s) ? (v>0?1:0) : 0), 0);
    // more careful count
    let cnt1 = 0, cnt2 = 0, cntTotal = 0;
    for (let di=0; di<31; di++) {
      if (!isDayValid(mi,di)) continue;
      if (col[di] > 0) {
        cntTotal++;
        if (di < 15) cnt1++; else cnt2++;
      }
    }
    const kg1 = cnt1 * 15;
    const kg2 = cnt2 * 15;
    const kgTot = cntTotal * 15;
    const spesa1 = cnt1 * d.costoPellet;
    const spesa2 = cnt2 * d.costoPellet;
    const spesaTot = cntTotal * d.costoPellet;
    const numDays = [31,30,31,31,28,31][mi];
    const avgKgDay = numDays > 0 ? kgTot / numDays : 0;
    const avgSpesaDay = numDays > 0 ? spesaTot / numDays : 0;
    return { cnt1, cnt2, cntTotal, kg1, kg2, kgTot, spesa1, spesa2, spesaTot, avgKgDay, avgSpesaDay };
  });

  const totalPelletSacchi = months.reduce((s,m) => s+m.cntTotal, 0);
  const totalPelletKg = totalPelletSacchi * 15;
  const totalPelletSpesa = months.reduce((s,m) => s+m.spesaTot, 0);
  const totalGasSpesa = d.gas.pagare.reduce((a,b) => a + (parseFloat(b)||0), 0);
  const totalSpese = totalPelletSpesa + totalGasSpesa;

  // stock
  const totalStock = (parseInt(d.pelletAbete.sacchi)||0) + (parseInt(d.pelletMisto.sacchi)||0);
  const sacchiDisp = totalStock - totalPelletSacchi;

  // costs table
  const costsRows = (d.costsRows || []).map(r => {
    const consumo = parseFloat(r.consumo) || 0;
    const spesa = consumo * (parseFloat(d.euroMq) || 0);
    return { ...r, spesa };
  });
  const costsSum = costsRows.slice(0,5).reduce((s,r) => s + r.spesa, 0);

  return { months, totalPelletSacchi, totalPelletKg, totalPelletSpesa,
           totalGasSpesa, totalSpese, sacchiDisp, totalStock, costsRows, costsSum };
}

// ── Render ──────────────────────────────────────────────────────────────────
let activeYear = YEARS[0];

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = YEARS.map(y =>
    `<button class="tab-btn ${y===activeYear?'active':''}" onclick="switchTab(${y})">${y}</button>`
  ).join('');
}

function switchTab(y) {
  activeYear = y;
  renderTabs();
  renderMain();
}

function fmt(n, dec=2) {
  return (Math.round(n * 100)/100).toLocaleString('it-IT', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}

function renderMain() {
  const y = activeYear;
  const d = state[y];
  const c = calcYear(y);
  const main = document.getElementById('main');

  main.innerHTML = `
    <!-- Summary -->
    <div class="summary-bar">
      <div class="scard">
        <div class="scard-label">Spese Totali ${y}</div>
        <div class="scard-val total">€ ${fmt(c.totalSpese)}</div>
      </div>
      <div class="scard">
        <div class="scard-label">Totale Pellet</div>
        <div class="scard-val pellet">€ ${fmt(c.totalPelletSpesa)}</div>
      </div>
      <div class="scard">
        <div class="scard-label">Totale Gas</div>
        <div class="scard-val gas">€ ${fmt(c.totalGasSpesa)}</div>
      </div>
      <div class="scard">
        <div class="scard-label">Sacchi usati / disp.</div>
        <div class="scard-val sacchi">${c.totalPelletSacchi} / ${c.sacchiDisp}</div>
      </div>
      <div class="scard">
        <div class="scard-label">Kg Pellet Totali</div>
        <div class="scard-val pellet">${c.totalPelletKg} kg</div>
      </div>
    </div>

    <!-- Pellet Config -->
    <div class="section">
      <div class="section-head"><span class="dot p"></span> Configurazione Pellet ${y}</div>
      <div class="pellet-config">
        <div class="config-group">
          <label>Costo Pellet al sacco (€)</label>
          <input type="number" step="0.01" value="${d.costoPellet}"
            onchange="updateField(${y},'costoPellet',parseFloat(this.value))">
        </div>
        <div class="config-group">
          <label>Pellet Abete</label>
          <div class="row-inputs">
            <div class="field-group">
              <label>Sacchi</label>
              <input type="number" class="narrow" value="${d.pelletAbete.sacchi}"
                onchange="updateNested(${y},'pelletAbete','sacchi',parseInt(this.value))">
            </div>
            <div class="field-group">
              <label>€/sacco</label>
              <input type="number" step="0.01" class="narrow" value="${d.pelletAbete.prezzo}"
                onchange="updateNested(${y},'pelletAbete','prezzo',parseFloat(this.value))">
            </div>
            <div class="field-group">
              <label>Costo tot.</label>
              <input type="text" class="narrow" value="€ ${fmt(d.pelletAbete.sacchi * d.pelletAbete.prezzo)}" readonly>
            </div>
          </div>
        </div>
        <div class="config-group">
          <label>Pellet Misto</label>
          <div class="row-inputs">
            <div class="field-group">
              <label>Sacchi</label>
              <input type="number" class="narrow" value="${d.pelletMisto.sacchi}"
                onchange="updateNested(${y},'pelletMisto','sacchi',parseInt(this.value))">
            </div>
            <div class="field-group">
              <label>€/sacco</label>
              <input type="number" step="0.01" class="narrow" value="${d.pelletMisto.prezzo}"
                onchange="updateNested(${y},'pelletMisto','prezzo',parseFloat(this.value))">
            </div>
            <div class="field-group">
              <label>Costo tot.</label>
              <input type="text" class="narrow" value="€ ${fmt(d.pelletMisto.sacchi * d.pelletMisto.prezzo)}" readonly>
            </div>
          </div>
        </div>
        <div class="config-group">
          <label>Totale sacchi acquistati</label>
          <input type="text" value="${(parseInt(d.pelletAbete.sacchi)||0)+(parseInt(d.pelletMisto.sacchi)||0)} sacchi — prezzo medio: € ${fmt(((d.pelletAbete.sacchi*d.pelletAbete.prezzo)+(d.pelletMisto.sacchi*d.pelletMisto.prezzo))/Math.max(1,(parseInt(d.pelletAbete.sacchi)||0)+(parseInt(d.pelletMisto.sacchi)||0)))}/sacco" readonly class="wide">
        </div>
      </div>
    </div>

    <!-- Riepilogo mensile pellet -->
    <div class="section">
      <div class="section-head"><span class="dot p"></span> Riepilogo Mensile Pellet</div>
      <div class="months-grid">
        <div class="mg-header">
          <div></div>
          ${MONTHS.map(m=>`<div>${m}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>1° quindicina sacchi</div>
          ${c.months.map(m=>`<div>${m.cnt1}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>2° quindicina sacchi</div>
          ${c.months.map(m=>`<div>${m.cnt2}</div>`).join('')}
        </div>
        <div class="mg-row total">
          <div>Totale sacchi</div>
          ${c.months.map(m=>`<div>${m.cntTotal}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>1° quindicina kg</div>
          ${c.months.map(m=>`<div>${m.kg1}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>2° quindicina kg</div>
          ${c.months.map(m=>`<div>${m.kg2}</div>`).join('')}
        </div>
        <div class="mg-row total">
          <div>Totale kg</div>
          ${c.months.map(m=>`<div>${m.kgTot}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>1° quindicina spesa</div>
          ${c.months.map(m=>`<div>€ ${fmt(m.spesa1)}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>2° quindicina spesa</div>
          ${c.months.map(m=>`<div>€ ${fmt(m.spesa2)}</div>`).join('')}
        </div>
        <div class="mg-row total">
          <div>Totale spesa pellet</div>
          ${c.months.map(m=>`<div>€ ${fmt(m.spesaTot)}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>Media kg/giorno</div>
          ${c.months.map(m=>`<div>${fmt(m.avgKgDay,2)}</div>`).join('')}
        </div>
        <div class="mg-row sub">
          <div>Media €/giorno</div>
          ${c.months.map(m=>`<div>€ ${fmt(m.avgSpesaDay,2)}</div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Griglia giornaliera sacchi -->
    <div class="section">
      <div class="section-head"><span class="dot p"></span> Registro Giornaliero Sacchi Pellet</div>
      <div class="info-note">✓ = sacco usato quel giorno (1 sacco = 15 kg)</div>
      <div class="day-grid-wrap">
        <div class="day-grid" id="daygrid-${y}">
          <div class="dg-header">
            <div>GG</div>
            ${MONTHS.map(m=>`<div>${m.substring(0,3)}</div>`).join('')}
          </div>
          ${buildDayGridRows(y, d)}
        </div>
      </div>
    </div>

    <!-- Ore accensione stufa -->
    <div class="section">
      <div class="section-head"><span class="dot p"></span> Orari Accensione Stufa</div>
      <div class="orario-grid">
        <div class="orario-label">Fascia 1</div>
        ${MONTHS.map((_,mi) => `<input class="orario-input" type="text" value="${d.orari[mi]||''}"
          placeholder="es. 05:30-20:00"
          onchange="updateArrayField(${y},'orari',${mi},this.value)">`).join('')}
        <div class="orario-label">Fascia 2</div>
        ${MONTHS.map((_,mi) => `<input class="orario-input" type="text" value="${d.orari2[mi]||''}"
          placeholder="es. 16:30-20:30"
          onchange="updateArrayField(${y},'orari2',${mi},this.value)">`).join('')}
      </div>
    </div>

    <!-- Gas -->
    <div class="section">
      <div class="section-head"><span class="dot g"></span> Consumi Gas ${y}</div>
      <div class="gas-grid">
        <div class="gas-row">
          <div></div>
          ${MONTHS.map(m=>`<div style="color:var(--muted);font-size:11px;text-align:center">${m}</div>`).join('')}
        </div>
        <div class="gas-row">
          <div>Totale da Pagare (€)</div>
          ${MONTHS.map((_,mi)=>`<div>
            <input class="gas-input" type="number" step="0.01" value="${d.gas.pagare[mi]||''}"
              onchange="updateGas(${y},'pagare',${mi},parseFloat(this.value)||0)">
          </div>`).join('')}
        </div>
        <div class="gas-row">
          <div>Smc</div>
          ${MONTHS.map((_,mi)=>`<div>
            <input class="gas-input" type="number" step="1" value="${d.gas.smc[mi]||''}"
              onchange="updateGas(${y},'smc',${mi},parseFloat(this.value)||0)">
          </div>`).join('')}
        </div>
        <div class="gas-row">
          <div>Costo al Smc (€)</div>
          ${MONTHS.map((_,mi)=>{
            const p = parseFloat(d.gas.pagare[mi])||0;
            const s = parseFloat(d.gas.smc[mi])||1;
            const costo = s===0 ? 0 : p/s;
            return `<div class="gas-calc">${fmt(costo,4)}</div>`;
          }).join('')}
        </div>
        <div class="mg-row total" style="display:contents">
          <div style="padding:8px 10px;background:var(--surface2);font-size:11px;color:var(--muted)">Totale Gas</div>
          ${MONTHS.map((_,mi)=>{
            const tot = (parseFloat(d.gas.pagare[mi])||0) + c.months[mi].spesaTot;
            return `<div style="padding:8px 10px;background:var(--surface2);color:var(--accent);text-align:center">€ ${fmt(tot)}</div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- Euro al MQ (costi gas annui) -->
    <div class="section">
      <div class="section-head"><span class="dot r"></span> Costi Gas (€/Smc) — Storico</div>
      <div class="pellet-config">
        <div class="config-group">
          <label>Euro al Smc (riferimento)</label>
          <input type="number" step="0.01" value="${d.euroMq||1.34}"
            onchange="updateField(${y},'euroMq',parseFloat(this.value))">
        </div>
      </div>
      <div class="costs-table">
        <table class="ctable">
          <tr>
            <th>Dal</th><th>Al</th><th>Giorni</th><th>Consumo (smc)</th><th>Media gg</th><th>Spesa (€)</th><th>Note</th><th></th>
          </tr>
          <tbody id="costs-tbody-${y}">
            ${renderCostRows(y, d, c)}
          </tbody>
        </table>
        <button class="add-row-btn" onclick="addCostRow(${y})">+ Aggiungi riga</button>
      </div>
    </div>
  `;
}

function buildDayGridRows(y, d) {
  let html = '';
  for (let day=0; day<31; day++) {
    html += `<div class="dg-row">
      <div class="day-num">${day+1}</div>
      ${MONTHS.map((_,mi) => {
        const valid = isDayValid(mi, day);
        const checked = valid && d.days[mi][day] > 0 ? 'checked' : '';
        const disabled = !valid ? 'disabled' : '';
        return `<div class="day-cell">
          <input type="checkbox" class="day-cb" ${checked} ${disabled}
            onchange="toggleDay(${y},${mi},${day},this.checked)">
        </div>`;
      }).join('')}
    </div>`;
  }
  return html;
}

function renderCostRows(y, d, c) {
  return (d.costsRows || []).map((r, ri) => {
    const consumo = parseFloat(r.consumo) || 0;
    const giorni = parseFloat(r.giorni) || 0;
    const media = giorni > 0 ? (consumo / giorni).toFixed(4) : '—';
    const spesa = consumo * (parseFloat(d.euroMq) || 0);
    return `<tr>
      <td><input type="text" value="${r.dal||''}" placeholder="01/10/${y}"
        onchange="updateCostRow(${y},${ri},'dal',this.value)"></td>
      <td><input type="text" value="${r.al||''}" placeholder="31/10/${y}"
        onchange="updateCostRow(${y},${ri},'al',this.value)"></td>
      <td><input type="number" value="${r.giorni||''}"
        onchange="updateCostRow(${y},${ri},'giorni',parseFloat(this.value)||0)"></td>
      <td><input type="number" step="0.01" value="${r.consumo||''}"
        onchange="updateCostRow(${y},${ri},'consumo',parseFloat(this.value)||0)"></td>
      <td class="calc-td">${media}</td>
      <td class="calc-td">€ ${fmt(spesa)}</td>
      <td><input type="text" value="${r.note||''}" placeholder="note"
        onchange="updateCostRow(${y},${ri},'note',this.value)"></td>
      <td><button class="del-row-btn" onclick="delCostRow(${y},${ri})">✕</button></td>
    </tr>`;
  }).join('');
}

// ── Event handlers ──────────────────────────────────────────────────────────
function updateField(y, key, val) {
  state[y][key] = val;
  saveState();
  renderMain();
}

function updateNested(y, obj, key, val) {
  state[y][obj][key] = val;
  saveState();
  renderMain();
}

function updateArrayField(y, arr, idx, val) {
  state[y][arr][idx] = val;
  saveState();
}

function updateGas(y, field, mi, val) {
  state[y].gas[field][mi] = val;
  saveState();
  renderMain();
}

function toggleDay(y, mi, day, checked) {
  state[y].days[mi][day] = checked ? 1 : 0;
  saveState();
  // Update summary only (avoid full re-render which resets checkboxes)
  const c = calcYear(y);
  updateSummaryBar(y, c);
  updateMonthlySection(y, c);
}

function updateSummaryBar(y, c) {
  // Quick partial update without full re-render
  renderMain();
}

function updateMonthlySection() { /* handled by renderMain */ }

function addCostRow(y) {
  state[y].costsRows = state[y].costsRows || [];
  state[y].costsRows.push({ dal:'', al:'', giorni:0, consumo:0, note:'' });
  saveState();
  renderMain();
}

function delCostRow(y, ri) {
  state[y].costsRows.splice(ri, 1);
  saveState();
  renderMain();
}

function updateCostRow(y, ri, key, val) {
  state[y].costsRows[ri][key] = val;
  saveState();
  // partial refresh of costs table
  const d = state[y];
  const c = calcYear(y);
  const tbody = document.getElementById(`costs-tbody-${y}`);
  if (tbody) tbody.innerHTML = renderCostRows(y, d, c);
}

// ── Init ────────────────────────────────────────────────────────────────────
YEARS.forEach(y => {
  if (!state[y]) state[y] = defaultYear(y);
  // Ensure all required fields exist (backward compat)
  if (!state[y].days) state[y].days = buildDayMatrix();
  if (!state[y].gas) state[y].gas = { pagare:[0,0,0,0,0,0], smc:[0,0,0,0,0,0] };
  if (!state[y].orari) state[y].orari = ['','','','','',''];
  if (!state[y].orari2) state[y].orari2 = ['','','','','',''];
  if (!state[y].costsRows) state[y].costsRows = [];
  if (!state[y].euroMq) state[y].euroMq = 1.34;
  if (!state[y].pelletAbete) state[y].pelletAbete = { sacchi:0, prezzo:6.7 };
  if (!state[y].pelletMisto) state[y].pelletMisto = { sacchi:0, prezzo:5.1 };
});

renderTabs();
renderMain();
</script>
</body>
</html>
